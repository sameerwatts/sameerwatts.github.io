<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Pick the theme before the first paint so the page never flashes the
         wrong colours. Prefers a previously saved choice, otherwise the OS
         setting. Kept tiny and inline (not a module) so it runs before the CSS
         and JS bundles load. useTheme.js reads this back on mount. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var theme =
            saved === 'dark' || saved === 'light'
              ? saved
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <link rel="icon" type="image/png" href="/images/favicon.png" />

    <!-- PWA basics: web app manifest (name/icons/colours for "Add to Home
         Screen"), the iOS home-screen icon, and the browser-UI theme colour.
         Icons live in public/icons and are generated from the star logo. -->
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="theme-color" content="#337ab7" />

    <!-- Preserve this exact viewport meta — mobile scaling depends on it (see CLAUDE.md §4). -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sameer Watts — Senior Software Engineer</title>

    <!-- Hind (headings) + Open Sans (body) — named in css/style.css but were
         never actually loaded until now. Weights match what's used: Hind 700
         (the only weight applied to any heading), Open Sans 400/600/700/900
         (default text / .logo / .nav-item / hero name respectively). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind:wght@700&family=Open+Sans:wght@400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="Portfolio of Sameer (Samir) Watts, a Senior Software Engineer with 8+ years building web applications and dashboards using React, JavaScript, and modern frontend tools."
    />
    <link rel="canonical" href="https://sameerwatts.com/" />

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sameerwatts.com/" />
    <meta property="og:site_name" content="Sameer Watts" />
    <meta
      property="og:title"
      content="Sameer Watts — Senior Software Engineer"
    />
    <meta
      property="og:description"
      content="Portfolio of Sameer (Samir) Watts, a Senior Software Engineer with 8+ years building web applications and dashboards using React, JavaScript, and modern frontend tools."
    />
    <meta
      property="og:image"
      content="https://sameerwatts.com/images/homeBg.jpg"
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Sameer Watts — Senior Software Engineer"
    />
    <meta
      name="twitter:description"
      content="Portfolio of Sameer (Samir) Watts, a Senior Software Engineer with 8+ years building web applications and dashboards using React, JavaScript, and modern frontend tools."
    />
    <meta
      name="twitter:image"
      content="https://sameerwatts.com/images/homeBg.jpg"
    />

    <!-- JSON-LD Person structured data, built from src/data/contacts.js and
         src/data/skills.js. Deliberately omits telephone (a phone number is
         a much more sensitive harvesting target than email, and isn't
         needed for this schema to be useful) and worksFor/alumniOf (the
         page lists past experience and has no education section, so
         neither would be accurate to claim). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Sameer Watts",
        "jobTitle": "Senior Software Engineer",
        "url": "https://sameerwatts.com/",
        "description": "Portfolio of Sameer (Samir) Watts, a Senior Software Engineer with 8+ years building web applications and dashboards using React, JavaScript, and modern frontend tools.",
        "email": "sameer.watts00@gmail.com",
        "sameAs": ["https://github.com/sameerwatts"],
        "knowsAbout": [
          "ReactJs",
          "Redux",
          "jQuery",
          "Bootstrap",
          "HTML5",
          "CSS3",
          "JavaScript",
          "Liquid"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
