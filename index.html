<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/favicon.png" />
    <!-- Preserve this exact viewport meta — mobile scaling depends on it (see CLAUDE.md §4). -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sameer Watts — Senior Software Engineer</title>

    <!-- Hind (headings) + Open Sans (body) — named in css/style.css but were
         never actually loaded until now. Weights match what's used: Hind 700
         (the only weight applied to any heading), Open Sans 400/600/700/900
         (default text / .logo / .nav-item / hero name respectively). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind:wght@700&family=Open+Sans:wght@400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="Portfolio of Sameer (Samir) Watts, a Senior Software Engineer with 8+ years building web applications and dashboards using React, JavaScript, and modern frontend tools."
    />
    <link rel="canonical" href="https://sameerwatts.com/" />

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sameerwatts.com/" />
    <meta property="og:site_name" content="Sameer Watts" />
    <meta
      property="og:title"
      content="Sameer Watts — Senior Software Engineer"
    />
    <meta
      property="og:description"
      content="Portfolio of Sameer (Samir) Watts, a Senior Software Engineer with 8+ years building web applications and dashboards using React, JavaScript, and modern frontend tools."
    />
    <meta
      property="og:image"
      content="https://sameerwatts.com/images/homeBg.jpg"
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Sameer Watts — Senior Software Engineer"
    />
    <meta
      name="twitter:description"
      content="Portfolio of Sameer (Samir) Watts, a Senior Software Engineer with 8+ years building web applications and dashboards using React, JavaScript, and modern frontend tools."
    />
    <meta
      name="twitter:image"
      content="https://sameerwatts.com/images/homeBg.jpg"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
